services:
  postgres:
    image: postgres:16-alpine
    container_name: solar-balls-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-solar_balls}
      POSTGRES_USER: ${POSTGRES_USER:-solar_balls}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-solar_balls_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-solar_balls}"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: solar-balls-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://solar_balls:solar_balls_dev@postgres:5432/solar_balls}
    ports:
      - "${API_PORT:-3000}:3000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: solar-balls-web
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  postgres-data:
